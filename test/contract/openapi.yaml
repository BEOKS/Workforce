openapi: 3.0.3
info:
  title: Workforce SUT Integration Contract
  version: 1.0.0
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      operationId: getHealth
      responses:
        '200':
          description: SUT health check
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /v1/ingester/connections:
    post:
      operationId: createIngesterConnection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngesterConnectionRequest'
      responses:
        '201':
          description: Connection created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngesterConnectionEntry'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    get:
      operationId: listIngesterConnections
      responses:
        '200':
          description: Connection list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngesterConnectionListResponse'

  /v1/ingester/connections/{connectionId}:
    get:
      operationId: getIngesterConnection
      parameters:
        - in: path
          name: connectionId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Connection detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngesterConnectionEntry'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      operationId: updateIngesterConnection
      parameters:
        - in: path
          name: connectionId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngesterConnectionRequest'
      responses:
        '200':
          description: Connection updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngesterConnectionEntry'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      operationId: deleteIngesterConnection
      parameters:
        - in: path
          name: connectionId
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Connection deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/ingester/poll:
    post:
      operationId: triggerIngesterPoll
      responses:
        '202':
          description: Poll accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TriggerIngesterPollResponse'

  /v1/ingester/audit/egress:
    get:
      operationId: getIngesterEgressAudit
      parameters:
        - in: query
          name: method
          required: false
          schema:
            type: string
        - in: query
          name: path
          required: false
          schema:
            type: string
        - in: query
          name: connectionId
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Egress audit events
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngesterEgressAuditResponse'

  /v1/tickets:
    post:
      operationId: createTicket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTicketRequest'
      responses:
        '201':
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTicketResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/eligibility/evaluate:
    post:
      operationId: evaluateEligibility
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluateEligibilityRequest'
      responses:
        '200':
          description: Eligibility decision output contract response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DecisionOutputContractResponse'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tickets/{ticketId}/eligibility:
    get:
      operationId: getEligibility
      parameters:
        - in: path
          name: ticketId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Eligibility response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EligibilityResponse'
        '404':
          description: Ticket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tickets/{ticketId}/inspection/answers:
    post:
      operationId: postInspectionAnswer
      parameters:
        - in: path
          name: ticketId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InspectionAnswerRequest'
      responses:
        '200':
          description: Inspection answer accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InspectionAnswerResponse'
        '409':
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tickets/{ticketId}/execute:
    post:
      operationId: triggerExecution
      parameters:
        - in: path
          name: ticketId
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Execution accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutionAcceptedResponse'
        '403':
          description: Forbidden by policy/approval/grants
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tickets/{ticketId}/status:
    get:
      operationId: getTicketStatus
      parameters:
        - in: path
          name: ticketId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ticket status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketStatusResponse'
        '404':
          description: Ticket not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/ingestion/status:
    get:
      operationId: getIngestionStatus
      responses:
        '200':
          description: Current ingestion mode and polling health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionStatusResponse'

  /v1/platform/tickets/{platformTicketId}:
    get:
      operationId: getPlatformTicket
      parameters:
        - in: path
          name: platformTicketId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ingested local ticket for given platform ticket id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformTicketResponse'
        '404':
          description: Platform ticket not ingested
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]

    IngesterConnectionRequest:
      type: object
      required:
        - connectionId
        - platformType
        - workspaceId
        - baseUrl
        - authType
        - secretRefId
        - pollingEnabled
        - pollingIntervalSec
        - webhookEnabled
        - status
        - priority
        - isDefault
      properties:
        connectionId:
          type: string
        platformType:
          type: string
          enum: [gitlab, github, jira, plane, focalboard]
        workspaceId:
          type: string
        boardId:
          type: string
        project:
          type: string
        repo:
          type: string
        baseUrl:
          type: string
        updatedPath:
          type: string
        authType:
          type: string
          enum: [token, app, oauth]
        secretRefId:
          type: string
        pollingEnabled:
          type: boolean
        pollingIntervalSec:
          type: integer
        webhookEnabled:
          type: boolean
        status:
          type: string
          enum: [active, paused, disabled]
        priority:
          type: integer
        isDefault:
          type: boolean

    IngesterConnectionEntry:
      allOf:
        - $ref: '#/components/schemas/IngesterConnectionRequest'
        - type: object
          required: [createdAt, updatedAt, connectionCheckPassed, connectionCheckMessage]
          properties:
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
            connectionCheckPassed:
              type: boolean
            connectionCheckMessage:
              type: string

    IngesterConnectionListResponse:
      type: object
      required: [connections]
      properties:
        connections:
          type: array
          items:
            $ref: '#/components/schemas/IngesterConnectionEntry'

    TriggerIngesterPollResponse:
      type: object
      required: [accepted, polledConnectionCount]
      properties:
        accepted:
          type: boolean
        polledConnectionCount:
          type: integer
        lastPollAt:
          type: string
          format: date-time
          nullable: true

    IngesterEgressEvent:
      type: object
      required: [source, method, path, status, at]
      properties:
        source:
          type: string
          enum: [ingester, executor]
        connectionId:
          type: string
          nullable: true
        platformType:
          type: string
          nullable: true
        method:
          type: string
        path:
          type: string
        status:
          type: integer
        errorCode:
          type: string
          nullable: true
        at:
          type: string
          format: date-time

    IngesterEgressAuditResponse:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items:
            $ref: '#/components/schemas/IngesterEgressEvent'

    CreateTicketRequest:
      type: object
      required: [title, description, requester]
      properties:
        title:
          type: string
        description:
          type: string
        requester:
          type: string
        labels:
          type: array
          items:
            type: string
        grant_ref_ids:
          type: array
          items:
            type: string
        delegation_dimensions:
          $ref: '#/components/schemas/DelegationDimensions'

    CreateTicketResponse:
      type: object
      required: [ticketId]
      properties:
        ticketId:
          type: string

    EligibilityResponse:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [ai_processable, requires_inspection, not_processable]
        reasonCodes:
          type: array
          items:
            type: string

    DelegationDimensions:
      type: object
      required:
        - complexity
        - criticality
        - uncertainty
        - cost
        - resource_requirements
        - constraints
        - verifiability
        - reversibility
        - contextuality
        - subjectivity
        - autonomy_level
        - monitoring_mode
      properties:
        complexity:
          type: string
          enum: [low, medium, high]
        criticality:
          type: string
          enum: [low, medium, high]
        uncertainty:
          type: string
          enum: [low, medium, high]
        cost:
          type: string
          enum: [low, medium, high]
        resource_requirements:
          type: string
          enum: [low, medium, high]
        constraints:
          type: string
          enum: [low, medium, high, legal, human_only]
        verifiability:
          type: string
          enum: [low, medium, high]
        reversibility:
          type: string
          enum: [low, medium, high]
        contextuality:
          type: string
          enum: [low, medium, high]
        subjectivity:
          type: string
          enum: [low, medium, high]
        autonomy_level:
          type: string
          enum: [low, medium, high]
        monitoring_mode:
          type: string
          enum: [outcome, process, continuous]

    EvaluateEligibilityRequest:
      type: object
      required: [title, description, requester, delegation_dimensions]
      properties:
        title:
          type: string
        description:
          type: string
        requester:
          type: string
        grant_ref_ids:
          type: array
          items:
            type: string
        delegation_dimensions:
          $ref: '#/components/schemas/DelegationDimensions'

    DecisionOutputContractResponse:
      type: object
      required: [is_ai_processable, decision_confidence, reason_codes, requires_inspection]
      properties:
        is_ai_processable:
          type: boolean
        decision_confidence:
          type: string
          enum: [high, medium, low]
        reason_codes:
          type: array
          items:
            type: string
        requires_inspection:
          type: boolean

    InspectionAnswerRequest:
      type: object
      required: [answers]
      properties:
        answers:
          type: object
          additionalProperties:
            type: string

    InspectionAnswerResponse:
      type: object
      required: [accepted]
      properties:
        accepted:
          type: boolean

    ExecutionAcceptedResponse:
      type: object
      required: [accepted, executionId]
      properties:
        accepted:
          type: boolean
        executionId:
          type: string

    TicketStatusResponse:
      type: object
      required: [state]
      properties:
        state:
          type: string
          enum:
            - NEW
            - TRIAGE_PENDING
            - TRIAGE_DONE
            - INSPECTION_QA
            - INSPECTION_APPROVAL
            - READY_TO_ASSIGN
            - DECOMPOSING
            - QUEUED
            - RUNNING
            - RETRYING
            - ESCALATED
            - DONE
        updatedAt:
          type: string
          format: date-time

    IngestionStatusResponse:
      type: object
      required: [webhookEnabled, pollingEnabled, pollIntervalMs, ingestedCount, activeConnectionCount]
      properties:
        webhookEnabled:
          type: boolean
        pollingEnabled:
          type: boolean
        pollIntervalMs:
          type: integer
        lastPollAt:
          type: string
          format: date-time
          nullable: true
        ingestedCount:
          type: integer
        activeConnectionCount:
          type: integer

    PlatformTicketResponse:
      type: object
      required: [platformTicketId, platform, ticketId, state, updatedAt]
      properties:
        platformTicketId:
          type: string
        platform:
          type: string
          enum: [gitlab, github, jira, plane, focalboard]
        ticketId:
          type: string
        state:
          type: string
          enum:
            - NEW
            - TRIAGE_PENDING
            - TRIAGE_DONE
            - INSPECTION_QA
            - INSPECTION_APPROVAL
            - READY_TO_ASSIGN
            - DECOMPOSING
            - QUEUED
            - RUNNING
            - RETRYING
            - ESCALATED
            - DONE
        updatedAt:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
