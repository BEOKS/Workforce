name: workforce-it

services:
  sut:
    build:
      context: ../sut
    image: workforce-sut:it
    container_name: workforce-it-sut
    environment:
      TARGET_PLATFORM_BASE_URL: http://openproject:80
      MOCKSERVER_BASE_URL: http://mockserver:1080
    ports:
      - "${SUT_PORT:-8080}:8080"
    depends_on:
      openproject:
        condition: service_healthy
      mockserver:
        condition: service_started
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - it-net

  openproject-db:
    image: postgres:14
    container_name: workforce-it-openproject-db
    environment:
      POSTGRES_USER: openproject
      POSTGRES_PASSWORD: openproject
      POSTGRES_DB: openproject
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openproject -d openproject"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - openproject-db-data:/var/lib/postgresql/data
    networks:
      - it-net

  openproject:
    image: openproject/openproject:14
    container_name: workforce-it-openproject
    environment:
      OPENPROJECT_HTTPS: "false"
      OPENPROJECT_HOST__NAME: ${OPENPROJECT_HOST__NAME:-localhost:8081}
      OPENPROJECT_SECRET_KEY_BASE: ${OPENPROJECT_SECRET_KEY_BASE:-change-me-please}
      OPENPROJECT_ADMIN_PASSWORD: ${OPENPROJECT_ADMIN_PASSWORD:-admin12345}
      DATABASE_URL: postgres://openproject:openproject@openproject-db:5432/openproject
    ports:
      - "${OPENPROJECT_PORT:-8081}:80"
    depends_on:
      openproject-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost/health_checks/default >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 40s
    networks:
      - it-net

  mockserver:
    image: mockserver/mockserver:5.15.0
    container_name: workforce-it-mockserver
    ports:
      - "${MOCKSERVER_PORT:-1080}:1080"
    environment:
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/expectations/expectations.json
    volumes:
      - ./mockserver:/config
    networks:
      - it-net

networks:
  it-net:
    name: workforce-it-net

volumes:
  openproject-db-data:
