name: workforce-it

services:
  sut:
    build:
      context: ../sut
    env_file:
      - ../sut/.env
    image: workforce-sut:it
    container_name: workforce-it-sut
    environment:
      TARGET_PLATFORM_BASE_URL: http://mockserver:1080
      MOCKSERVER_BASE_URL: http://mockserver:1080
      POLLING_PLATFORM_BASE_URL: http://mockserver:1080
      PLATFORM_POLLING_TARGETS: gitlab,github,jira,plane,focalboard
      PLATFORM_GITLAB_UPDATED_PATH: /gitlab/api/v4/projects/42/issues
      PLATFORM_GITHUB_UPDATED_PATH: /github/api/v3/repos/workforce/sample/issues
      PLATFORM_JIRA_SEARCH_PATH: /jira/rest/api/3/search
      PLATFORM_PLANE_UPDATED_PATH: /plane/api/v1/workspaces/workspace-qa/issues
      PLATFORM_UPDATED_TICKETS_PATH: /ticket-platform/v1/tickets/updated
      PLATFORM_POLLING_ENABLED: "true"
      PLATFORM_WEBHOOK_ENABLED: "false"
      PLATFORM_POLL_INTERVAL_MS: 1000
    ports:
      - "${SUT_PORT:-8080}:8080"
    depends_on:
      mockserver:
        condition: service_started
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://localhost:8080/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    networks:
      - it-net

  mockserver:
    image: mockserver/mockserver:5.15.0
    container_name: workforce-it-mockserver
    ports:
      - "${MOCKSERVER_PORT:-1080}:1080"
    environment:
      MOCKSERVER_INITIALIZATION_JSON_PATH: /config/expectations/expectations.json
    volumes:
      - ./mockserver:/config
    networks:
      - it-net

networks:
  it-net:
    name: workforce-it-net
